<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURORA STUDIO AI PRO</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
color:white;
height:100vh;
overflow:hidden;
}

.header{
height:70px;
background:#111827;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
border-bottom:1px solid #334155;
}

.container{
display:flex;
height:calc(100vh - 70px);
}

.sidebar{
width:280px;
background:#111827;
padding:15px;
overflow-y:auto;
}

.canvas-area{
flex:1;
display:flex;
justify-content:center;
align-items:center;
background:#1e293b;
}

.canvas{
width:900px;
height:550px;
background:white;
position:relative;
border-radius:12px;
overflow:hidden;
}

/* العناصر */
.design-text, .design-image{
position:absolute;
cursor:move;
user-select:none;
}

.design-text{
font-size:24px;
color:black;
font-weight:bold;
}

.design-image{
max-width:200px;
max-height:200px;
}

/* sidebar */
button{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:8px;
cursor:pointer;
}

.primary{background:#7c3aed;color:white;}
.success{background:#10b981;color:white;}
.danger{background:#ef4444;color:white;}

input,select{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
}

/* تحديد العنصر */
.selected{
outline:2px dashed #7c3aed;
}
</style>
</head>

<body>

<div class="header">
<div>🚀 AURORA STUDIO AI PRO</div>
<div>محرر احترافي</div>
</div>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">

<h3>📝 نص</h3>
<input id="textInput" placeholder="اكتب نص">
<button class="primary" onclick="addText()">إضافة نص</button>

<h3>🖼️ صورة</h3>
<input type="file" id="imageInput">
<button class="success" onclick="uploadImage()">إضافة صورة</button>

<h3>🎨 خلفية</h3>
<select onchange="changeColor(this.value)">
<option value="white">أبيض</option>
<option value="lightblue">أزرق</option>
<option value="pink">وردي</option>
<option value="black">أسود</option>
</select>

<h3>🧹 حذف</h3>
<button class="danger" onclick="clearCanvas()">مسح الكل</button>

</div>

<!-- CANVAS -->
<div class="canvas-area">
<div class="canvas" id="canvas"></div>
</div>

</div>

<script>

let selectedElement = null;

/* اختيار عنصر */
function selectElement(el){
if(selectedElement){
selectedElement.classList.remove("selected");
}
selectedElement = el;
el.classList.add("selected");
}

/* سحب العناصر */
function makeDraggable(el){

let offsetX = 0;
let offsetY = 0;
let dragging = false;

el.addEventListener("mousedown", (e)=>{
dragging = true;
selectElement(el);

offsetX = e.clientX - el.offsetLeft;
offsetY = e.clientY - el.offsetTop;
});

document.addEventListener("mousemove", (e)=>{
if(!dragging) return;

el.style.left = (e.clientX - offsetX) + "px";
el.style.top = (e.clientY - offsetY) + "px";
});

document.addEventListener("mouseup", ()=>{
dragging = false;
});
}

/* إضافة نص */
function addText(){
let text = document.getElementById("textInput").value;
if(!text) return;

let el = document.createElement("div");
el.className = "design-text";
el.innerText = text;

el.style.left = "100px";
el.style.top = "100px";

document.getElementById("canvas").appendChild(el);

makeDraggable(el);
selectElement(el);
}

/* رفع صورة */
function uploadImage(){
let file = document.getElementById("imageInput").files[0];
if(!file) return;

let reader = new FileReader();

reader.onload = function(e){
let img = document.createElement("img");
img.src = e.target.result;
img.className = "design-image";

img.style.left = "150px";
img.style.top = "150px";

document.getElementById("canvas").appendChild(img);

makeDraggable(img);
selectElement(img);
};

reader.readAsDataURL(file);
}

/* تغيير الخلفية */
function changeColor(color){
document.getElementById("canvas").style.background = color;
}

/* حذف الكل */
function clearCanvas(){
document.getElementById("canvas").innerHTML = "";
selectedElement = null;
}

</script>

</body>
</html>
