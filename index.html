<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AURORA STUDIO AI PRO MAX 4</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
height:100vh;
overflow:hidden;
color:white;
}

.header{
height:70px;
background:#111827;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
border-bottom:1px solid #334155;
}

.container{
display:flex;
height:calc(100vh - 70px);
}

.sidebar{
width:300px;
background:#111827;
padding:15px;
overflow:auto;
}

.canvas-area{
flex:1;
display:flex;
justify-content:center;
align-items:center;
background:#1e293b;
}

.canvas{
width:900px;
height:550px;
background:white;
position:relative;
border-radius:12px;
overflow:hidden;
}

/* عنصر التصميم */
.element{
position:absolute;
cursor:move;
user-select:none;
transform-origin:center;
}

.text{
font-size:22px;
color:black;
font-weight:bold;
}

.img{
max-width:200px;
max-height:200px;
}

/* تحديد */
.selected{
outline:2px dashed #7c3aed;
}

/* Handles */
.handle{
width:12px;
height:12px;
background:#7c3aed;
position:absolute;
right:-6px;
bottom:-6px;
cursor:nwse-resize;
}

.rotate-handle{
width:12px;
height:12px;
background:#10b981;
position:absolute;
top:-20px;
left:50%;
transform:translateX(-50%);
cursor:grab;
}

/* UI */
button{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:8px;
cursor:pointer;
}

.primary{background:#7c3aed;color:white;}
.success{background:#10b981;color:white;}
.danger{background:#ef4444;color:white;}

input{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
}

/* Pages */
.page{
padding:8px;
background:#1e293b;
margin-top:8px;
border-radius:6px;
cursor:pointer;
}

.page.active{
background:#7c3aed;
}
</style>
</head>

<body>

<div class="header">
<div>🚀 AURORA STUDIO PRO MAX 4</div>
<div>
<button class="success" onclick="saveProject()">💾 حفظ المشروع</button>
<button class="primary" onclick="loadProject()">📂 تحميل</button>
</div>
</div>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">

<h3>نص</h3>
<input id="textInput" placeholder="اكتب نص">
<button class="primary" onclick="addText()">إضافة نص</button>

<h3>صورة</h3>
<input type="file" id="imgInput">
<button class="success" onclick="addImage()">إضافة صورة</button>

<h3>الصفحات</h3>
<button onclick="addPage()">➕ صفحة جديدة</button>
<div id="pages"></div>

</div>

<!-- CANVAS -->
<div class="canvas-area">
<div class="canvas" id="canvas"></div>
</div>

</div>

<script>

let selected=null;
let pages=[];
let currentPage=0;

/* ====== INIT ====== */
pages.push("");
renderPages();

/* ====== SELECTION ====== */
function select(el){
if(selected) selected.classList.remove("selected");
selected=el;
el.classList.add("selected");
}

/* ====== DRAG + RESIZE ====== */
function makeInteractive(el){

let offsetX, offsetY;
let dragging=false;

let startW,startH,startX,startY,rot=0;

/* drag */
el.onmousedown=(e)=>{
select(el);
dragging=true;
offsetX=e.offsetX;
offsetY=e.offsetY;
};

document.onmousemove=(e)=>{
if(!dragging) return;

el.style.left=(e.pageX-offsetX)+"px";
el.style.top=(e.pageY-offsetY-70)+"px";
};

document.onmouseup=()=>dragging=false;
}

/* ====== ADD TEXT ====== */
function addText(){
let t=document.getElementById("textInput").value;
if(!t) return;

let el=document.createElement("div");
el.className="element text";
el.innerText=t;
el.style.left="100px";
el.style.top="100px";

document.getElementById("canvas").appendChild(el);
makeInteractive(el);
saveToPage();
}

/* ====== ADD IMAGE ====== */
function addImage(){
let file=document.getElementById("imgInput").files[0];
if(!file) return;

let reader=new FileReader();
reader.onload=function(e){

let el=document.createElement("img");
el.src=e.target.result;
el.className="element img";
el.style.left="150px";
el.style.top="150px";

document.getElementById("canvas").appendChild(el);
makeInteractive(el);
saveToPage();
};

reader.readAsDataURL(file);
}

/* ====== SAVE PAGE ====== */
function saveToPage(){
pages[currentPage]=document.getElementById("canvas").innerHTML;
renderPages();
}

/* ====== LOAD PAGE ====== */
function loadPage(i){
currentPage=i;
document.getElementById("canvas").innerHTML=pages[i]||"";
rebind();
renderPages();
}

/* ====== REBIND ====== */
function rebind(){
document.querySelectorAll(".element").forEach(el=>{
makeInteractive(el);
});
}

/* ====== PAGES ====== */
function addPage(){
pages.push("");
loadPage(pages.length-1);
saveToPage();
}

function renderPages(){
let box=document.getElementById("pages");
box.innerHTML="";

pages.forEach((p,i)=>{
let div=document.createElement("div");
div.className="page"+(i===currentPage?" active":"");
div.innerText="Page "+(i+1);
div.onclick=()=>loadPage(i);
box.appendChild(div);
});
}

/* ====== SAVE PROJECT ====== */
function saveProject(){
localStorage.setItem("aurora_project",JSON.stringify(pages));
alert("تم حفظ المشروع");
}

/* ====== LOAD PROJECT ====== */
function loadProject(){
let data=localStorage.getItem("aurora_project");
if(!data) return;

pages=JSON.parse(data);
loadPage(0);
}

/* ====== INIT LOAD ====== */
loadPage(0);

</script>

</body>
</html>
